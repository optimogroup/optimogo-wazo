# Enable the OptimoGo XSI plugin on wazo-phoned.
#
# It serves Wazo call history to Yealink phones' "Network CallLog" and Wazo
# voicemail to their visual-voicemail screen, over the BroadWorks XSI paths
# (/com.broadsoft.xsi-actions/...), backed by wazo-call-logd and wazo-calld.
# phoned ships neither a call-logd nor a calld client, so we add both here;
# xivo's config ChainMap deep-merges this into enabled_plugins, leaving the stock
# vendor plugins on.
call_logd:
  host: localhost
  port: 9298
  prefix: null
  https: false
calld:
  host: localhost
  port: 9500
  prefix: null
  https: false
enabled_plugins:
  optimogo_xsi_calllog: true
