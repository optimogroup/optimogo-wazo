[pytest]
testpaths = tests
markers =
    needs_dird: test requires the wazo_dird package (run in Dockerfile.dev container)
    needs_ui: test requires the wazo_ui package (run in Dockerfile.dev container)
    needs_calld: test requires the wazo_calld package (run in Dockerfile.dev container)
    needs_sox: test requires the sox binary (skipped where sox is absent)
addopts = -v
